# ═══════════════════════════════════════════════════════════════
# Argent Clair — GitHub Actions Deploy Pipeline (Netlify)
#
# Secrets à configurer dans GitHub :
#   Settings → Secrets and variables → Actions
#   - PREMIUM_SALT       : votre sel secret de validation
#   - WHATSAPP_NUMBER    : votre numéro format 237XXXXXXXXX
#   - NETLIFY_AUTH_TOKEN : token API Netlify (voir guide)
#   - NETLIFY_SITE_ID    : ID du site Netlify (voir guide)
# ═══════════════════════════════════════════════════════════════

name: Deploy Argent Clair to Netlify

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets
        env:
          PREMIUM_SALT: ${{ secrets.PREMIUM_SALT }}
          WHATSAPP_NUMBER: ${{ secrets.WHATSAPP_NUMBER }}
        run: |
          if [ -z "$PREMIUM_SALT" ]; then echo "PREMIUM_SALT manquant" && exit 1; fi
          if [ -z "$WHATSAPP_NUMBER" ]; then echo "WHATSAPP_NUMBER manquant" && exit 1; fi
          sed -i "s|%%PREMIUM_SALT%%|${PREMIUM_SALT}|g" index.html
          sed -i "s|237XXXXXXXXX|${WHATSAPP_NUMBER}|g" index.html
          grep -q "%%PREMIUM_SALT%%" index.html && echo "SALT non remplace" && exit 1 || true
          grep -q "237XXXXXXXXX" index.html && echo "WhatsApp non remplace" && exit 1 || true
          echo "Secrets injectes avec succes"

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: '.'
          production-branch: main
          production-deploy: true
          deploy-message: "Deploy ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Done
        run: echo "Argent Clair deploye sur Netlify"
