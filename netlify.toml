# ═══════════════════════════════════════════════════════════════
# Argent Clair — Configuration Netlify
# ═══════════════════════════════════════════════════════════════

[build]
  publish   = "."
  command   = "echo 'Build OK'"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── Headers sécurité ──
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/icon-*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── SPA fallback ──
# Note : /.netlify/functions/* est géré automatiquement par Netlify
# Ne jamais redéfinir ce chemin ici
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
  force  = false
